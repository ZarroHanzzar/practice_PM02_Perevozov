# pytest.ini
[pytest]
minversion = 7.0
addopts = -v --cov=src --cov-report=term --cov-report=html --cov-fail-under=80
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    crypto: Crypto-specific tests